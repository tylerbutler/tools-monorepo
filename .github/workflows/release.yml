name: Release

on:
  push:
    branches:
      - main
    paths:
      - .changeset/**

  workflow_dispatch:
    inputs:
      publish_public:
        # If this is false, the packages will be published to the internal npm feed instead of public npm.
        description: 'Publish to public npm'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # For changesets PR creation
      pull-requests: write # For changesets PR updates
      id-token: write # OIDC token for npm trusted publishing
      attestations: write # For GitHub build attestations

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          token: ${{ secrets.CHANGESET_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm

      - uses: tylerbutler/actions/setup-rust@c4c45a8284082163bc58623acfc4b3dc98633c3d # ratchet:tylerbutler/actions/setup-rust@main
        with:
          tools: ''

      - uses: ./.github/actions/setup-nx
        with:
          # Nx Cloud controlled by repository variable NX_CLOUD_RELEASE
          enable-nx-cloud-var: ${{ vars.NX_CLOUD_RELEASE }}

      # Despite the name, this step either creates/updates a PR or publishes packages
      # To improve the experience viewing the results in the Actions UI, subsequent steps log
      # the action that was actually taken.
      - name: Process changesets
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # ratchet:changesets/action@v1
        with:
          version: pnpm ci:version
          title: "🚀 release: Update versions"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}

      - name: Debug output
        run: |
          echo "Published: ${{ steps.changesets.outputs.published }}"
          echo "Packages: ${{ steps.changesets.outputs.publishedPackages }}"
          echo "HasChangesets: ${{ steps.changesets.outputs.hasChangesets }}"

      - name: Setup .npmrc for public npm
        if: github.event.inputs.publish_public != 'false' && steps.changesets.outputs.hasChangesets != 'true'
        run: echo -e "\n//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Setup .npmrc for private feed
        if: github.event.inputs.publish_public == 'false' && steps.changesets.outputs.hasChangesets != 'true'
        run: |
          echo -e "\n//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          echo -e "\n@tylerbutler:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Create Version Tracking PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          echo "### PR updated :clipboard:" >> $GITHUB_STEP_SUMMARY
          echo "No packages published. See the release PR for details. Merge it to publish packages." >> $GITHUB_STEP_SUMMARY

      - run: pnpm run build
        if: steps.changesets.outputs.hasChangesets != 'true'
      - run: git status -u .
        if: steps.changesets.outputs.hasChangesets != 'true'

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets != 'true'
        id: publish
        env:
          PUBLISH: ${{ github.event.inputs.publish_public == 'false' && 'ci:publish:internal' || 'ci:publish'  }}

        run: |
          # Run publish
          pnpm run $PUBLISH

          # Output the publish report as an output variable
          contents=$(if [ -f pnpm-publish-summary.json ]; then cat pnpm-publish-summary.json; else echo ""; fi)
          compact_contents=$(echo "$contents" | jq -c '.publishedPackages')
          echo "$compact_contents"
          echo "report=$compact_contents" >> $GITHUB_OUTPUT

      - name: Output report
        if: steps.publish.outputs.report != null && steps.publish.outputs.report != '[]'
        run: |
          echo "### Packages published! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Packages published to npm!" >> $GITHUB_STEP_SUMMARY

      - name: Create table
        if: steps.publish.outputs.report != null && steps.publish.outputs.report != '[]'
        id: create-table
        uses: parkerbxyz/json-to-markdown-table@564b4821b8128f1cd7a0eb6b5616680a818719ab # ratchet:parkerbxyz/json-to-markdown-table@v1
        with:
          json: '${{ steps.publish.outputs.report }}'

      # Generate GitHub-native attestations for published packages (public npm only)
      # This creates SLSA-compliant build provenance verifiable via `gh attestation verify`
      - name: Generate build attestations
        if: |
          steps.publish.outputs.report != null &&
          steps.publish.outputs.report != '[]' &&
          github.event.inputs.publish_public != 'false'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # ratchet:actions/attest-build-provenance@v4
        with:
          subject-path: |
            packages/*/esm/**/*.js
            packages/*/esm/**/*.mjs

      - name: No packages published
        if: steps.publish.outputs.report == '[]'
        run: |
          echo "### No packages to publish" >> $GITHUB_STEP_SUMMARY
          echo "There were no packages to publish." >> $GITHUB_STEP_SUMMARY

      - name: Trigger repopo-core binary release
        if: steps.publish.outputs.report != '[]' && steps.publish.outputs.report != null
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # ratchet:actions/github-script@v9
        with:
          script: |
            const packages = JSON.parse('${{ steps.publish.outputs.report }}');
            const repopo = packages.find(p => p.name === 'repopo');
            if (repopo) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'repopo-core-release.yml',
                ref: 'main',
                inputs: { version: repopo.version },
              });
              console.log(`Triggered repopo-core binary release for v${repopo.version}`);
            }
