# DISABLED: Switched to Dependabot
# See .github/dependabot.yml and .github/workflows/dependabot-build-artifacts.yml
name: Renovate (Disabled)
on:
  # schedule:
  #   # Run at 5 AM UTC on weekdays (matches "before 5am every weekday" in renovate.json5)
  #   - cron: '0 5 * * 1-5'
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - run: npm i --global corepack@latest
      - run: corepack enable

      - uses: renovatebot/github-action@f66d8679fcfcfa051abde6e7a623007173bf5164 # ratchet:renovatebot/github-action@v46.1.12
        with:
          configurationFile: renovate.json5
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: "tylerbutler/tools-monorepo"
          RENOVATE_ALLOWED_COMMANDS: '["^pnpm .*"]'
          RENOVATE_ALLOW_SCRIPTS: true
